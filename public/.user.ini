; =============================================================================
; PHP Configuration for PHP-FPM
; These settings override php.ini for this directory and subdirectories
; =============================================================================

; Memory & Execution
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; Security
expose_php = Off
display_errors = Off
display_startup_errors = Off
allow_url_include = Off

; Session Security
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
session.use_only_cookies = 1

; Uploads
upload_max_filesize = 50M
post_max_size = 55M
max_file_uploads = 20

; OPcache (production optimizations)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1

; Error Logging (hide from users, log to file)
log_errors = On
error_log = /home/resp/sub/api/storage/logs/php_errors.log
